name: 合并即触发同步到下游账号

# main 一有合并/推送，就通知 mykaloooo/devin-config 跑「同步仓库」
on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: 通知 devin-config 跑同步
        run: |
          curl -sf -X POST \
            -H "Authorization: token ${{ secrets.SYNC_DISPATCH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/mykaloooo/devin-config/actions/workflows/sync-repos.yml/dispatches \
            -d '{"ref":"setup"}'
